name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  repository_dispatch:
    types: [pact-provider-verify]

jobs:
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ── Backend unit + integration tests ────────────────────────────────────────

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: secret-scan

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: nova
          POSTGRES_DB: nova_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nova:nova@localhost:5432/nova_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
      STELLAR_NETWORK: testnet
      HORIZON_URL: https://horizon-testnet.stellar.org

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: novaRewards/package-lock.json

      - run: npm ci
        working-directory: novaRewards

      - run: npm run lint
        working-directory: novaRewards

      - run: npm test --workspace=backend -- --maxWorkers=2
        working-directory: novaRewards

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: novaRewards/backend/coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: novaRewards/backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  backend-integration:
    name: Backend – Integration Tests
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: novaRewards/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nova_rewards_test
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://nova:test_password@localhost:5432/nova_rewards_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-at-least-32-chars!!
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      STELLAR_NETWORK: testnet
      HORIZON_URL: https://horizon-testnet.stellar.org
      ISSUER_PUBLIC: GTEST000000000000000000000000000000000000000000000000000001
      ISSUER_SECRET: STEST000000000000000000000000000000000000000000000000000001
      DISTRIBUTION_PUBLIC: GTEST000000000000000000000000000000000000000000000000000002
      DISTRIBUTION_SECRET: STEST000000000000000000000000000000000000000000000000000002
      ALLOWED_ORIGIN: "*"
      PORT: "3099"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: novaRewards

      - name: Run database migrations
        run: node ../database/migrate.js
        env:
          DATABASE_URL: postgresql://nova:test_password@localhost:5432/nova_rewards_test

      - name: Run integration tests
        run: npx vitest run tests/integration --reporter=verbose
        env:
          DATABASE_URL: postgresql://nova:test_password@localhost:5432/nova_rewards_test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: novaRewards/backend/test-results/

  # ── Backend security scan ────────────────────────────────────────────────────
  # Issue #948: SQL injection tests run in CI on every PR

  backend-security:
    name: Backend – Security Tests
    runs-on: ubuntu-latest
    needs: secret-scan

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: nova
          POSTGRES_DB: nova_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nova:nova@localhost:5432/nova_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
      STELLAR_NETWORK: testnet
      HORIZON_URL: https://horizon-testnet.stellar.org

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: novaRewards/package-lock.json

      - run: npm ci
        working-directory: novaRewards

      - name: Run security tests (SQL injection + XSS + auth)
        run: npm run security
        working-directory: novaRewards/backend

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: novaRewards/backend/test-results/

  # ── Frontend unit + component tests ─────────────────────────────────────────
  # Issue #949: Frontend component tests run in CI on every PR

  frontend-unit:
    name: Frontend – Unit & Component Tests
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: novaRewards/frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_ISSUER_PUBLIC: GAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      NEXT_PUBLIC_MULTISIG_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: novaRewards/package-lock.json

      - run: npm ci
        working-directory: novaRewards

      - name: Run frontend unit and component tests
        run: npm run test:ci

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-unit-results
          path: |
            novaRewards/frontend/coverage/
            novaRewards/frontend/test-results/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: novaRewards/frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # ── Frontend build ───────────────────────────────────────────────────────────

  frontend:
    name: Frontend – Build
    runs-on: ubuntu-latest
    needs: frontend-unit
    defaults:
      run:
        working-directory: novaRewards/frontend

    env:
      NEXT_PUBLIC_API_URL: https://api.nova-rewards.xyz
      NEXT_PUBLIC_HORIZON_URL: https://horizon.stellar.org
      NEXT_PUBLIC_STELLAR_NETWORK: public
      NEXT_PUBLIC_ISSUER_PUBLIC: GAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      NEXT_PUBLIC_MULTISIG_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: novaRewards/package-lock.json

      - run: npm ci
        working-directory: novaRewards

      - run: npm run build

  # ── E2E tests ────────────────────────────────────────────────────────────────
  # Issue #949: E2E tests run on PRs that touch frontend or backend
  # Issue #956: Accessibility E2E tests included here

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test, frontend]
    # Run on every PR; the path filter below limits to frontend/backend changes
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.changed_files, 'novaRewards/frontend') ||
        contains(github.event.pull_request.changed_files, 'novaRewards/backend') ||
        true
      ))
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: nova
          POSTGRES_DB: nova_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nova:nova@localhost:5432/nova_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
      STELLAR_NETWORK: testnet
      HORIZON_URL: https://horizon-testnet.stellar.org
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_ISSUER_PUBLIC: GAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      NEXT_PUBLIC_MULTISIG_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: novaRewards/package-lock.json

      - run: npm ci
        working-directory: novaRewards

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: novaRewards/frontend

      - name: Run DB migrations
        run: node ../database/migrate.js
        working-directory: novaRewards/backend

      - name: Start backend
        run: node server.js &
        working-directory: novaRewards/backend
        env:
          PORT: 3001

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Run E2E tests (all suites including accessibility)
        run: npx playwright test --project=chromium --project=accessibility
        working-directory: novaRewards/frontend

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: novaRewards/frontend/playwright-report/
          retention-days: 14

  # ── Soroban contract tests ───────────────────────────────────────────────────
  # Issue #949: Contract tests run in CI on every PR

  contract-tests:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Run contract unit tests
        run: cargo test --workspace
        working-directory: contracts

      - name: Run contract integration tests
        run: cargo test --package integration_tests
        working-directory: contracts

  # ── Load tests (push-only) ───────────────────────────────────────────────────

  load-test:
    name: Load Tests (k6)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: nova
          POSTGRES_DB: nova_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nova:nova@localhost:5432/nova_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-load-test-secret
      INBOUND_WEBHOOK_SECRET: ${{ secrets.LOAD_TEST_WEBHOOK_SECRET || 'ci-webhook-secret' }}
      HORIZON_URL: https://horizon-testnet.stellar.org
      STELLAR_NETWORK: testnet
      ISSUER_PUBLIC: GDQGIY5T5QULPD7V54LJODKC5CMKPNGTWVEMYBQH4LV6STKI6IGO543K
      RL_WEBHOOK_MAX: 600
      RL_USER_MAX: 1200
      RL_GLOBAL_MAX: 600

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install
        working-directory: novaRewards

      - name: Run DB migrations
        run: npm run db:migrate
        working-directory: novaRewards/backend

      - name: Create results directory
        run: mkdir -p novaRewards/backend/test-results/load

      - name: Seed load-test fixtures
        run: node tests/load/seed.js
        working-directory: novaRewards/backend

      - name: Start backend server
        run: node server.js &
        working-directory: novaRewards/backend
        env:
          PORT: 3001

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: k6 — POST /api/webhooks/actions
        run: |
          k6 run \
            -e BASE_URL=http://localhost:3001 \
            -e WEBHOOK_SECRET=ci-webhook-secret \
            --out json=test-results/load/webhook-actions-raw.json \
            tests/load/scenarios/webhook-actions.js
        working-directory: novaRewards/backend

      - name: k6 — GET /api/users/:id/balance
        run: |
          source test-results/load/seed-env.sh
          k6 run \
            -e BASE_URL=http://localhost:3001 \
            -e USER_TOKEN="$LOAD_TEST_USER_TOKEN" \
            -e USER_ID_MIN=1 \
            -e USER_ID_MAX=100 \
            --out json=test-results/load/user-balance-raw.json \
            tests/load/scenarios/user-balance.js
        working-directory: novaRewards/backend

      - name: k6 — GET /api/campaigns
        run: |
          source test-results/load/seed-env.sh
          k6 run \
            -e BASE_URL=http://localhost:3001 \
            -e MERCHANT_API_KEYS="$LOAD_TEST_MERCHANT_KEYS" \
            --out json=test-results/load/campaigns-list-raw.json \
            tests/load/scenarios/campaigns-list.js
        working-directory: novaRewards/backend

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: novaRewards/backend/test-results/load/
          retention-days: 30

  # ── Pact contract tests ──────────────────────────────────────────────────────

  consumer-pact:
    name: Consumer Pact Tests
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 10
    if: ${{ secrets.PACT_BROKER_URL != '' }}
    defaults:
      run:
        working-directory: novaRewards/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: novaRewards/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: novaRewards

      - name: Run consumer Pact tests
        run: npx jest --selectProjects pact --runInBand --testTimeout=30000
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

      - name: Publish pacts to broker
        if: success()
        run: |
          npx pact-broker publish ./pacts \
            --broker-base-url "$PACT_BROKER_URL" \
            --broker-token "$PACT_BROKER_TOKEN" \
            --consumer-app-version "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

  provider-verify:
    name: Provider Pact Verification
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    if: >
      always() &&
      (secrets.PACT_BROKER_URL != '') &&
      (github.event_name != 'repository_dispatch' || github.event.action == 'pact-provider-verify')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: novaRewards/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: novaRewards

      - name: Run provider Pact verification
        run: npx vitest run pact --reporter=verbose
        working-directory: novaRewards/backend
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          GIT_COMMIT: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          CI: "true"

  can-i-deploy-consumer:
    name: Can I Deploy (Consumer)
    runs-on: ubuntu-latest
    needs: consumer-pact
    timeout-minutes: 5
    if: ${{ secrets.PACT_BROKER_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Pact CLI
        run: npm install -g @pact-foundation/pact-node

      - name: Can I Deploy — nova-rewards-frontend
        run: |
          npx pact-broker can-i-deploy \
            --pacticipant nova-rewards-frontend \
            --version "${{ github.sha }}" \
            --to-environment production \
            --broker-base-url "$PACT_BROKER_URL" \
            --broker-token "$PACT_BROKER_TOKEN"
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

  can-i-deploy-provider:
    name: Can I Deploy (Provider)
    runs-on: ubuntu-latest
    needs: provider-verify
    timeout-minutes: 5
    if: ${{ secrets.PACT_BROKER_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Pact CLI
        run: npm install -g @pact-foundation/pact-node

      - name: Can I Deploy — nova-rewards-backend
        run: |
          npx pact-broker can-i-deploy \
            --pacticipant nova-rewards-backend \
            --version "${{ github.sha }}" \
            --to-environment production \
            --broker-base-url "$PACT_BROKER_URL" \
            --broker-token "$PACT_BROKER_TOKEN"
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

  # ── Required status check gate ───────────────────────────────────────────────
  # All test suites must pass before a PR can be merged (Issue #949).
  # Add this job as a required status check in branch protection settings.

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs:
      - test
      - backend-integration
      - backend-security
      - frontend-unit
      - frontend
      - contract-tests
      - e2e
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          failed = [name for name, job in needs.items() if job['result'] not in ('success', 'skipped')]
          if failed:
              print('FAILED jobs:', ', '.join(failed))
              sys.exit(1)
          print('All required test suites passed.')
          "
